<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الملحقة | العوضي للاستيراد</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; }
        .table-container { overflow-x: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #1a252f; color: #fff; }
        tr:hover { background-color: #f1f1f1; }
        select { padding: 5px; border-radius: 4px; font-weight: bold; background-color: #fff; border: 1px solid #ccc; cursor: pointer; }
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-delete:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <h1>📦 لوحة إدارة وعمليات الطلبات - العوضي</h1>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>العميل</th>
                    <th>الهاتف</th>
                    <th>المنتج</th>
                    <th>التفاصيل</th>
                    <th>التاريخ</th>
                    <th>إجراءات الحالة</th>
                    <th>إجراء الإلغاء</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr><td colspan="7" style="text-align: center;">جاري جلب البيانات...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function fetchOrders() {
            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();
                const tableBody = document.getElementById('ordersTableBody');
                tableBody.innerHTML = ''; 

                if(orders.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center;">لا توجد طلبات سحابية حالياً</td></tr>';
                    return;
                }

                orders.forEach(order => {
                    const date = new Date(order.createdAt).toLocaleDateString('ar-EG');
                    const row = `
                        <tr>
                            <td><strong>${order.clientName}</strong></td>
                            <td dir="ltr">${order.phone}</td>
                            <td>${order.productType}</td>
                            <td>${order.details}</td>
                            <td>${date}</td>
                            <td>
                                <select onchange="updateStatus('${order._id}', this.value)">
                                    <option value="قيد المراجعة" ${order.status === 'قيد المراجعة' ? 'selected' : ''}>⏳ قيد المراجعة</option>
                                    <option value="تم الشحن" ${order.status === 'تم الشحن' ? 'selected' : ''}>🚚 تم الشحن</option>
                                    <option value="مكتمل" ${order.status === 'مكتمل' ? 'selected' : ''}>✅ مكتمل</option>
                                </select>
                            </td>
                            <td>
                                <button class="btn-delete" onclick="deleteOrder('${order._id}')">🗑️ حذف</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">خطأ في تحميل البيانات.</td></tr>';
            }
        }

        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`/api/orders/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (response.ok) alert('تم تحديث حالة الطلبية بنجاح في السحابة!');
            } catch (error) {
                alert('فشل في تحديث الحالة');
            }
        }

        async function deleteOrder(id) {
            if(confirm('هل أنت متأكد من رغبتك في حذف هذا الطلب نهائياً؟')) {
                try {
                    const response = await fetch(`/api/orders/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        alert('تم حذف الطلب بنجاح!');
                        fetchOrders(); // إعادة تحميل الجدول
                    }
                } catch (error) {
                    alert('فشل في حذف الطلب');
                }
            }
        }

        fetchOrders();
    </script>
</body>
</html>
